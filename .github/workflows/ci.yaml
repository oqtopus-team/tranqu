name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel outdated workflows for the same PR or branch
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint and Format check
        run: |
          uv lock --check
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Detect changed docs files
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - "docs/**"

      - name: Documentation Lint
        if: steps.changes.outputs.docs == 'true'
        run: uv run pymarkdown scan docs

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        #python-version: ["3.10", "3.14"]
        python-version: ["3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # enable-cache: true
          enable-cache: false
          cache-dependency-glob: "**/uv.lock"
          # cache-python: true
          cache-python: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        # run: uv sync --frozen --all-groups
        run: uv sync --frozen --all-groups --reinstall

      - name: Debug environment
        run: |
          uv run python --version
          uv run python -c "import qiskit; print('qiskit', qiskit.__version__)"
          uv run python -c "import openqasm3; print('openqasm3', openqasm3.__version__)"
          uv run python -c "import pytket; print('pytket', pytket.__version__)"
          uv run python -c "import importlib.metadata as m; print('antlr4-python3-runtime', m.version('antlr4-python3-runtime'))"
          uv tree | grep -E "qiskit|openqasm|pytket|antlr"

      - name: Dump converted QASM
        run: |
          uv run python -c "
          from pytket import Circuit
          from tranqu.program_converter import TketToQiskitProgramConverter, QiskitToOpenqasm3ProgramConverter

          tket_circuit = Circuit(1)
          qiskit_circuit = TketToQiskitProgramConverter().convert(tket_circuit)
          qasm = QiskitToOpenqasm3ProgramConverter().convert(qiskit_circuit)

          print(type(qasm))
          print(repr(qasm))
          "

      - name: Run tests
        run: uv run pytest --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        # Only upload for the primary version to avoid collisions/redundancy
        if: github.actor != 'dependabot[bot]' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
